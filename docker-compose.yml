version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: convo-postgres-docker
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: convo
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: convo-redis-docker
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-1:
    build: .
    container_name: convo-api-1
    environment:
      PORT: 3002
      DATABASE_URL: postgres://postgres:password@postgres:5432/convo
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:5180
      JWT_ACCESS_SECRET: supersecretaccesskey123!
      JWT_REFRESH_SECRET: supersecretrefreshkey456!
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm run db:migrate --workspace=api && npm run start --workspace=api"

  api-2:
    build: .
    container_name: convo-api-2
    environment:
      PORT: 3002
      DATABASE_URL: postgres://postgres:password@postgres:5432/convo
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:5180
      JWT_ACCESS_SECRET: supersecretaccesskey123!
      JWT_REFRESH_SECRET: supersecretrefreshkey456!
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm run start --workspace=api"

  nginx:
    image: nginx:alpine
    container_name: convo-nginx-lb
    ports:
      - "3002:3002"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-1
      - api-2

volumes:
  pgdata:
