version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: convo-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: convo
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
